version: "3.8"

# ─────────────────────────────────────────────────────────────────
#  K6 + InfluxDB + Grafana  — Live Stress-Test Dashboard Stack
#  Usage:
#    docker compose up -d grafana influxdb
#    docker compose run k6
# ─────────────────────────────────────────────────────────────────

services:

  # ── InfluxDB  (time-series metrics store) ──────────────────────
  influxdb:
    image: influxdb:1.8
    container_name: ejz-influxdb
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB:                k6
      INFLUXDB_HTTP_AUTH_ENABLED: "false"
    volumes:
      - influxdb-data:/var/lib/influxdb

  # ── Grafana  (live dashboard) ──────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: ejz-grafana
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED:  "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-provisioning:/etc/grafana/provisioning
    depends_on:
      - influxdb

  # ── k6  (load generator) ───────────────────────────────────────
  k6:
    image: grafana/k6:latest
    container_name: ejz-k6
    command: run --out influxdb=http://influxdb:8086/k6 /scripts/stress-test-ejz.js
    volumes:
      - ./:/scripts
    environment:
      K6_INFLUXDB_PUSH_INTERVAL: 1s
      # Optional overrides
      # TARGET_URL: https://ejz-frontend.vercel.app
      # TEST_EMAIL: your@email.com
      # TEST_PASS:  yourpassword
    depends_on:
      - influxdb

volumes:
  influxdb-data:
  grafana-data:
